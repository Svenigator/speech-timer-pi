<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Timer - Display</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/display.css') }}">
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
</head>
<body>
    <div id="display-container">
        <!-- Timer-Modus -->
        <div id="timer-mode" class="display-mode">
            <div id="preset-name"></div>
            <div id="timer-container">
                <div id="timer-display">00:00</div>
                <div id="progress-bar">
                    <div id="progress-fill"></div>
                </div>
            </div>
            <div id="status-text">Bereit</div>
        </div>

        <!-- Uhr-Modus -->
        <div id="clock-mode" class="display-mode hidden">
            <div id="clock-display">--:--:--</div>
            <div id="clock-date"></div>
        </div>
    </div>

    <script>
        let config = {{ config.display | tojson }};
        window.initialConfig = config;
    </script>
    <script src="{{ url_for('static', filename='js/display.js') }}"></script>
</body>
</html>
